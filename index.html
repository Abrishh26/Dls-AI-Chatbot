<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLS & COAL AI Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b1512;
      --bg-dot:      #10201a;
      --surface:     #10201a;
      --panel:       #132420;
      --border:      #24382f;
      --border-lt:   #33493d;
      --copper:      #d99a5b;
      --copper-dk:   #b97f42;
      --led:         #5ce6a0;
      --text:        #e9efe6;
      --muted:       #6f8a7c;
      --user-bg:     #d99a5b1c;
      --bot-bg:      #132420;
      --danger:      #ff6b5c;
      --radius:      10px;
      --font-body:   'DM Sans', system-ui, sans-serif;
      --font-mono:   'JetBrains Mono', 'Segoe UI Mono', monospace;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 1px 1px, #1c3229 1px, transparent 0) 0 0/18px 18px,
        var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header — reads like an IC top silkscreen ── */
    header {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      left: 24px; right: 24px; bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--copper) 20%, var(--copper) 80%, transparent);
      opacity: 0.55;
    }

    header .logo {
      position: relative;
      width: 40px; height: 40px;
      background: var(--panel);
      border: 1px solid var(--copper);
      border-radius: 6px;
      display: grid; place-items: center;
      font-size: 19px;
      flex-shrink: 0;
    }
    /* pin marks either side of the chip, like a DIP package */
    header .logo::before,
    header .logo::after {
      content: '';
      position: absolute;
      width: 6px; height: 2px;
      background: var(--copper);
      top: 50%; transform: translateY(-50%);
    }
    header .logo::before { left: -6px; }
    header .logo::after  { right: -6px; }

    header h1 {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    header p  {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--panel);
      color: var(--copper);
      border: 1px solid var(--border-lt);
      letter-spacing: 0.02em;
    }

    /* ── Onboarding — a datasheet panel ── */
    #onboarding {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 34px 26px 26px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* fiducial corner marks, top-left and bottom-right */
    #onboarding::before,
    #onboarding::after {
      content: '+';
      position: absolute;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--border-lt);
      line-height: 1;
    }
    #onboarding::before { top: 8px; left: 10px; }
    #onboarding::after  { bottom: 8px; right: 10px; }

    #onboarding h2 {
      font-family: var(--font-mono);
      font-size: 1.02rem;
      font-weight: 700;
      text-align: center;
    }
    #onboarding p  { font-size: 0.82rem; color: var(--muted); text-align: center; }

    label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--copper);
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, select {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--copper); }
    select option { background: var(--bg); }

    button.primary {
      width: 100%;
      padding: 12px;
      background: var(--copper);
      color: #14231d;
      border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button.primary:hover   { background: var(--copper-dk); }
    button.primary:active  { transform: translateY(1px); }

    /* ── Chat UI ── */
    #chat-ui {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 800px;
      flex: 1;
      min-height: 0;
    }

    /* Context bar */
    #context-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    #context-bar span {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #context-bar select {
      width: auto;
      padding: 4px 8px;
      font-size: 0.78rem;
      border-radius: 4px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 6px;
      display: grid; place-items: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid var(--border-lt);
    }

    .msg.user .avatar { background: var(--copper); border-color: var(--copper); }
    .msg.bot  .avatar { background: var(--panel); }

    /* bubble corner clipped like a solder pad */
    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #d99a5b55;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
    }

    .msg.error .bubble { border-color: var(--danger); color: var(--danger); }

    /* Typing indicator — three status LEDs */
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 3px;
      background: var(--led);
      border-radius: 50%;
      box-shadow: 0 0 5px var(--led);
      animation: blink-led 1.1s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s;  }
    @keyframes blink-led { 0%, 60%, 100% { opacity: 0.25; } 30% { opacity: 1; } }

    /* Input row */
    #input-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }

    #user-input {
      flex: 1;
      padding: 11px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color .15s;
    }
    #user-input:focus { border-color: var(--copper); }

    /* send button — a physical pushbutton */
    #send-btn {
      width: 44px; height: 44px;
      background: var(--copper);
      border: none;
      border-bottom: 3px solid var(--copper-dk);
      border-radius: 6px;
      color: #14231d;
      font-size: 17px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .15s;
    }
    #send-btn:hover    { background: var(--copper-dk); }
    #send-btn:active   { border-bottom-width: 1px; transform: translateY(2px); }
    #send-btn:disabled { background: var(--border); border-bottom-color: var(--border); cursor: not-allowed; }

    /* Streaming cursor */
    .cursor::after {
      content: '▋';
      animation: blink .7s step-end infinite;
      color: var(--copper);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Token counter */
    #token-info {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      padding: 0 20px 6px;
    }

    /* ── Feedback widget ── */
    .feedback-widget {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .feedback-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .feedback-comment-box {
      margin-top: 10px;
    }

    .feedback-comment-input {
      width: 100%;
      resize: none;
      font-family: var(--font-body);
      font-size: 13px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }

    .feedback-comment-input:focus {
      outline: none;
      border-color: var(--copper);
    }

    .feedback-comment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }

    .feedback-comment-submit,
    .feedback-comment-skip {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
    }

    .feedback-comment-submit {
      background: var(--copper);
      border-color: var(--copper);
      color: #14231d;
    }

    .feedback-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-right: 4px;
      text-transform: uppercase;
    }

    .feedback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .feedback-btn svg {
      width: 14px;
      height: 14px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
    }

    .feedback-btn:hover { border-color: var(--copper); }
    .feedback-btn:hover svg { stroke: var(--copper); }

    .feedback-btn.selected.feedback-up {
      background: #10241a;
      border-color: var(--led);
    }
    .feedback-btn.selected.feedback-up svg { stroke: var(--led); }

    .feedback-btn.selected.feedback-down {
      background: #2a1a1a;
      border-color: var(--danger);
    }
    .feedback-btn.selected.feedback-down svg { stroke: var(--danger); }

    .feedback-btn:disabled { cursor: default; opacity: 0.7; }

    .feedback-status {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">🧠</div>
  <div>
    <h1>DLS & COAL Mentor</h1>
    <p>Digital Logic Studio & Computer Organization — AI Teaching Assistant</p>
  </div>
  <span class="badge" id="model-badge">llama-3.3-70b</span>
</header>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <h2>👋 Welcome to DLS & COAL Mentor</h2>
  <p>Your tutor for <strong>Digital Logic (DLD)</strong> and <strong>Computer Organization & Assembly (COAL)</strong>. Let's personalise your experience.</p>

  <div>
    <label for="ob-name">Your name</label>
    <input id="ob-name" type="text" placeholder="e.g. Ali" autocomplete="off" />
  </div>

  <div>
    <label for="ob-level">Your current level</label>
    <select id="ob-level">
      <option value="beginner">Beginner — new to digital logic</option>
      <option value="intermediate" selected>Intermediate — know the basics</option>
      <option value="advanced">Advanced — comfortable with circuits</option>
    </select>
  </div>

  <div>
    <label for="ob-course">Course track</label>
    <select id="ob-course">
      <option value="dld">DLD — Digital Logic Design</option>
      <option value="coal">COAL — Computer Organization & Assembly</option>
    </select>
  </div>

  <div>
    <label for="ob-topic">Starting topic</label>
    <select id="ob-topic"></select>
  </div>

  <button class="primary" id="start-btn">Start chatting →</button>
</div>

<!-- ── CHAT UI ── -->
<div id="chat-ui">
  <div id="context-bar">
    <span>Course:</span>
    <select id="course-select">
      <option value="dld">DLD</option>
      <option value="coal">COAL</option>
    </select>
    <span style="margin-left:8px">Topic:</span>
    <select id="topic-select"></select>
    <span style="margin-left:8px">Level:</span>
    <select id="level-select">
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
  </div>

  <div id="messages"></div>
  <div id="token-info"></div>

  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask about DLD, COAL, circuits, or assembly…"></textarea>
    <button id="send-btn" title="Send (Enter)">➤</button>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────
  const API_BASE   = 'http://localhost:5100/api/ai';
  const recentTopics = [];
  let userName     = '';
  let streaming    = false;

  const TOPIC_OPTIONS = {
    dld: [
      { value: 'boolean-algebra', label: 'Boolean Algebra' },
      { value: 'number-systems', label: 'Number Systems' },
      { value: 'arithmetic-circuits', label: 'Arithmetic Circuits' },
      { value: 'memory', label: 'Memory (Latches & Flip-flops)' },
      { value: 'sequential-circuits', label: 'Sequential Circuits' },
    ],
    coal: [
      { value: 'intro-computer-organization', label: 'Intro to Computer Organization' },
      { value: 'number-systems-representation', label: 'Number Systems & Representation' },
      { value: 'digital-logic-bridge', label: 'Digital Logic Bridge' },
      { value: 'cpu-components', label: 'CPU Components & Registers' },
      { value: 'instruction-cycle', label: 'Instruction Cycle' },
      { value: 'memory-hierarchy', label: 'Memory Hierarchy' },
      { value: 'instruction-set-architecture', label: 'Instruction Set Architecture' },
      { value: 'addressing-modes', label: 'Addressing Modes' },
      { value: 'coal-syntax', label: 'Data Movement & Instructions' },
      { value: 'control-flow', label: 'Control Flow & Branches' },
      { value: 'procedures-stack', label: 'Procedures & Stack' },
      { value: 'ia32-architecture', label: 'Intel IA-32 Architecture' },
    ],
  };

  function populateTopicSelect(selectEl, course, selectedValue) {
    const options = TOPIC_OPTIONS[course] || TOPIC_OPTIONS.dld;
    selectEl.innerHTML = options
      .map((opt) => `<option value="${opt.value}">${opt.label}</option>`)
      .join('');
    if (selectedValue && options.some((opt) => opt.value === selectedValue)) {
      selectEl.value = selectedValue;
    }
  }

  function syncCourseTopicSelects(course, topic) {
    populateTopicSelect(document.getElementById('ob-topic'), course, topic);
    populateTopicSelect(topicSelect, course, topic);
    courseSelect.value = course;
    document.getElementById('ob-course').value = course;
  }

  // ── DOM refs ───────────────────────────────────────────────────────────
  const onboarding   = document.getElementById('onboarding');
  const chatUI       = document.getElementById('chat-ui');
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('user-input');
  const sendBtn      = document.getElementById('send-btn');
  const courseSelect = document.getElementById('course-select');
  const topicSelect  = document.getElementById('topic-select');
  const levelSelect  = document.getElementById('level-select');
  const tokenInfo    = document.getElementById('token-info');

  populateTopicSelect(document.getElementById('ob-topic'), 'dld');
  populateTopicSelect(topicSelect, 'dld');

  document.getElementById('ob-course').addEventListener('change', (e) => {
    populateTopicSelect(document.getElementById('ob-topic'), e.target.value);
  });

  courseSelect.addEventListener('change', (e) => {
    populateTopicSelect(topicSelect, e.target.value);
  });

  // ── Onboarding ─────────────────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    const name   = document.getElementById('ob-name').value.trim() || 'Learner';
    const level  = document.getElementById('ob-level').value;
    const course = document.getElementById('ob-course').value;
    const topic  = document.getElementById('ob-topic').value;

    userName = name;
    syncCourseTopicSelects(course, topic);
    levelSelect.value = level;

    onboarding.style.display = 'none';
    chatUI.style.display = 'flex';

    const courseLabel = course === 'coal' ? 'COAL' : 'DLD';
    addBotMessage(
      `Hi ${name}! 👋 I'm your DLS & COAL Mentor. Ask me anything about **${courseLabel}** — especially **${formatTopic(topic)}**. I'm here to help with digital logic and computer organization.`,
    );
    inputEl.focus();
  });

  // ── Send message ────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    const currentTopic = topicSelect.value;
    const currentCourse = courseSelect.value === 'coal' ? 'COAL' : 'DLS';
    const difficulty   = levelSelect.value;

    // Track recent topics (last 3, no duplicates)
    if (!recentTopics.includes(currentTopic)) {
      recentTopics.unshift(currentTopic);
      if (recentTopics.length > 3) recentTopics.pop();
    }

    addUserMessage(text);
    inputEl.value = '';
    autoResize();
    tokenInfo.textContent = '';

    const typingId = addTypingIndicator();
    sendBtn.disabled = true;
    streaming = true;

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          context: {
            name: userName,
            currentCourse,
            currentTopic,
            recentTopics: [...recentTopics],
            difficulty,
            learnerLevel: difficulty,
          },
        }),
      });

      removeMessage(typingId);

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
        addErrorMessage(err.error || `Request failed (${res.status})`);
        return;
      }

      const data = await res.json();
      addBotMessage(data.reply || 'No response received.');

      if (data.tokensUsed) {
        tokenInfo.textContent = `Tokens used: ${data.tokensUsed} · Model: ${data.model}`;
      }

    } catch (err) {
      removeMessage(typingId);
      addErrorMessage('Could not reach the server. Is it running on port 5100?');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      streaming = false;
      scrollToBottom();
    }
  }

  // ── Message helpers ─────────────────────────────────────────────────────
  let msgCounter = 0;

  function addUserMessage(text) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg user" id="${id}">
        <div class="avatar">👤</div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function addBotMessage(text, streaming = false) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">🧠</div>
        <div class="bubble${streaming ? ' cursor' : ''}">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function updateBotMessage(id, text, isCursor = false, isError = false) {
    const el = document.querySelector(`#${id} .bubble`);
    if (!el) return;
    el.textContent = text;
    el.classList.toggle('cursor', isCursor);
    if (isError) el.style.color = 'var(--danger)';
  }

  function addTypingIndicator() {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot" id="${id}">
        <div class="avatar">🧠</div>
        <div class="bubble typing-dots"><span></span><span></span><span></span></div>
      </div>`);
    scrollToBottom();
    return id;
  }

  function addErrorMessage(text) {
    const id = `msg-${++msgCounter}`;
    messagesEl.insertAdjacentHTML('beforeend', `
      <div class="msg bot error" id="${id}">
        <div class="avatar">⚠️</div>
        <div class="bubble">${escHtml(text)}</div>
      </div>`);
    scrollToBottom();
    attachFeedbackWidget(document.getElementById(id), { question: 'test', answer: text });
  }

  function removeMessage(id) {
    document.getElementById(id)?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTopic(slug) {
    return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  // ── Input auto-resize ──────────────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  }

  inputEl.addEventListener('input', autoResize);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
</script>
<script src="/public/feedback-widget.js"></script>
</body>
</html>
